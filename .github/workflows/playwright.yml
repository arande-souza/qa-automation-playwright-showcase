name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Restore test history
      uses: actions/cache/restore@v4
      with:
        path: reports/.playwright-history
        key: playwright-history-${{ github.ref_name }}-${{ github.run_id }}
        restore-keys: |
          playwright-history-${{ github.ref_name }}-
    - name: Install dependencies
      run: npm ci
    - name: Enable Corepack
      run: corepack enable
    - name: Install Real World App dependencies
      working-directory: qa-realworld-app
      run: yarn install --frozen-lockfile
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      id: playwright_tests
      run: npx playwright test
    - name: Generate dashboard report
      if: ${{ always() }}
      run: node scripts/generate-playwright-dashboard.js
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/
        retention-days: 30
    - name: Save test history
      if: ${{ always() }}
      uses: actions/cache/save@v4
      with:
        path: reports/.playwright-history
        key: playwright-history-${{ github.ref_name }}-${{ github.run_id }}
